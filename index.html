<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ザクザクラーメンキング 3D</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="header-ui">
        <div style="font-size: 11px; color: #bbb; letter-spacing: 2px;">RAMEN TYCOON 3D</div>
        <div id="money">¥0</div>
    </div>

    <div id="canvas-container">
        <div id="label-kitchen" class="stock-label">出来上がり: 0杯</div>
        <div id="label-serve" class="stock-label">カウンター: 0杯</div>
        <div id="label-cash" class="stock-label">空き席</div>
    </div>

    <div id="control-panel">
        <div class="upgrade-card">
            <div class="card-title">👨‍🍳 厨房 <span class="level-badge" id="lvl-kitchen">Lv.1</span></div>
            <div class="card-stats" id="stats-kitchen">速度: 1.0秒</div>
            <button class="upgrade-btn" id="btn-kitchen">強化: ¥10</button>
        </div>

        <div class="upgrade-card">
            <div class="card-title">🏃‍♂️ 配膳車 <span class="level-badge" id="lvl-serve">Lv.1</span></div>
            <div class="card-stats" id="stats-serve">速度: 1.5秒</div>
            <button class="upgrade-btn" id="btn-serve">強化: ¥15</button>
        </div>

        <div class="upgrade-card">
            <div class="card-title">💰 レジ <span class="level-badge" id="lvl-cash">Lv.1</span></div>
            <div class="card-stats" id="stats-cash">速度: 2.0秒</div>
            <button class="upgrade-btn" id="btn-cash">強化: ¥20</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
