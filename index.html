<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ザクザクラーメンキング 3D (Ramen Tycoon 3D)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #1a1a1a;
            color: #fff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 3D表示領域 */
        #canvas-container {
            flex: 1;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* 上部ダッシュボード */
        #header-ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #d32f2f;
            border-radius: 12px;
            padding: 10px 40px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        #money {
            font-size: 36px;
            font-weight: bold;
            color: #4caf50;
            text-shadow: 0 0 10px rgba(76,175,80,0.5);
        }

        /* 下部操作パネル（アップグレード） */
        #control-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            z-index: 10;
        }

        .upgrade-card {
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid #444;
            border-radius: 10px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .card-title {
            font-size: 14px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            color: #ffb74d;
        }

        .level-badge {
            background: #d32f2f;
            color: #fff;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 11px;
        }

        .card-stats {
            font-size: 11px;
            color: #aaa;
        }

        .upgrade-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }

        .upgrade-btn:hover {
            background: #388e3c;
        }

        .upgrade-btn:disabled {
            background: #424242;
            color: #757575;
            cursor: not-allowed;
        }

        /* 3D空間上のフローティングテキスト用 */
        .stock-label {
            position: absolute;
            background: rgba(0,0,0,0.7);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            border: 1px solid #666;
            transform: translate(-50%, -50%);
            display: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="header-ui">
        <div style="font-size: 12px; color: #bbb; letter-spacing: 2px;">RAMEN TYCOON 3D</div>
        <div id="money">¥0</div>
    </div>

    <div id="canvas-container">
        <div id="label-kitchen" class="stock-label">出来上がり: 0杯</div>
        <div id="label-serve" class="stock-label">カウンター: 0杯</div>
        <div id="label-cash" class="stock-label">売上待ち</div>
    </div>

    <div id="control-panel">
        <div class="upgrade-card">
            <div class="card-title">
                <span>👨‍🍳 1. 厨房</span>
                <span class="level-badge" id="lvl-kitchen">Lv.1</span>
            </div>
            <div class="card-stats" id="stats-kitchen">速度: 1.0秒 | 容量: 1</div>
            <button class="upgrade-btn" id="btn-kitchen" onclick="upgrade('kitchen')">強化: ¥10</button>
        </div>

        <div class="upgrade-card">
            <div class="card-title">
                <span>🏃‍♂️ 2. 配膳車</span>
                <span class="level-badge" id="lvl-serve">Lv.1</span>
            </div>
            <div class="card-stats" id="stats-serve">速度: 1.5秒 | 容量: 1</div>
            <button class="upgrade-btn" id="btn-serve" onclick="upgrade('serve')">強化: ¥15</button>
        </div>

        <div class="upgrade-card">
            <div class="card-title">
                <span>💰 3. レジ</span>
                <span class="level-badge" id="lvl-cash">Lv.1</span>
            </div>
            <div class="card-stats" id="stats-cash">速度: 2.0秒 | 容量: 1</div>
            <button class="upgrade-btn" id="btn-cash" onclick="upgrade('cash')">強化: ¥20</button>
        </div>
    </div>

    <script>
        // --- ゲームデータ ---
        let gameState = {
            money: 15,
            kitchen: { lv: 1, stock: 0, timer: 0, baseCost: 10, speed: 1.0, cap: 1 },
            serve: { lv: 1, stock: 0, timer: 0, baseCost: 15, speed: 1.5, cap: 1 },
            cash: { lv: 1, stock: 0, timer: 0, baseCost: 20, speed: 2.0, cap: 1 }
        };
        const RAMEN_PRICE = 800;

        // --- Three.js 3Dセットアップ ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e1e24);

        // クォータービュー（俯瞰）カメラの設計
        const aspect = container.clientWidth / container.clientHeight;
        const d = 6;
        const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 0.1, 1000);
        // 斜め上から見下ろす位置にカメラを配置
        camera.position.set(8, 8, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // 照明
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- 3Dオブジェクトの作成（お店の床と設備） ---
        // 床
        const floorGeo = new THREE.BoxGeometry(10, 0.2, 5);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x424242 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.position.y = -0.1;
        scene.add(floor);

        // 1. 厨房 (赤のブース)
        const kitchenGeo = new THREE.BoxGeometry(1.5, 1, 2);
        const kitchenMat = new THREE.MeshStandardMaterial({ color: 0xe53935 });
        const kitchenMesh = new THREE.Mesh(kitchenGeo, kitchenMat);
        kitchenMesh.position.set(-3.5, 0.5, 0);
        scene.add(kitchenMesh);

        // 2. カウンター/配膳エリア (木目のブース)
        const counterGeo = new THREE.BoxGeometry(1.5, 0.8, 3);
        const counterMat = new THREE.MeshStandardMaterial({ color: 0xa1887f });
        const counterMesh = new THREE.Mesh(counterGeo, counterMat);
        counterMesh.position.set(0, 0.4, 0);
        scene.add(counterMesh);

        // 3. レジ (青のブース)
        const cashGeo = new THREE.BoxGeometry(1.5, 1, 1.5);
        const cashMat = new THREE.MeshStandardMaterial({ color: 0x1e88e5 });
        const cashMesh = new THREE.Mesh(cashGeo, cashMat);
        cashMesh.position.set(3.5, 0.5, 0);
        scene.add(cashMesh);

        // 動く配膳カート (黄色い小さなブロック)
        const cartGeo = new THREE.BoxGeometry(0.5, 0.4, 0.5);
        const cartMat = new THREE.MeshStandardMaterial({ color: 0xfdd835 });
        const cartMesh = new THREE.Mesh(cartGeo, cartMat);
        cartMesh.position.set(-3, 0.3, 1.8);
        scene.add(cartMesh);

        // ラーメンの見た目（どんぶりを模した黄色いシリンダー）
        const ramenInstances = [];
        const ramenGeo = new THREE.CylinderGeometry(0.2, 0.13, 0.15, 8);
        const ramenMat = new THREE.MeshStandardMaterial({ color: 0xffb300 });

        // ラーメンを画面内に生成・配置する関数
        function updateRamenVisuals() {
            // いったん古いラーメンをシーンから消す
            ramenInstances.forEach(mesh => scene.remove(mesh));
            ramenInstances.length = 0;

            // 厨房のストック（厨房の上にスタック）
            for(let i=0; i<Math.min(gameState.kitchen.stock, 5); i++) {
                const mesh = new THREE.Mesh(ramenGeo, ramenMat);
                mesh.position.set(-3.5, 1.1 + (i*0.18), 0);
                scene.add(mesh);
                ramenInstances.push(mesh);
            }

            // カウンターのストック（カウンターの上に並べる）
            for(let i=0; i<Math.min(gameState.serve.stock, 8); i++) {
                const mesh = new THREE.Mesh(ramenGeo, ramenMat);
                // ずらして並べる
                let row = i % 2;
                let col = Math.floor(i / 2);
                mesh.position.set(-0.2 + (row*0.4), 0.9, -1 + (col*0.5));
                scene.add(mesh);
                ramenInstances.push(mesh);
            }
        }

        // --- UIテキストの位置を3D空間に同期するマッピング処理 ---
        function updateLabelPosition(mesh, elementId) {
            const vector = new THREE.Vector3();
            mesh.updateMatrixWorld();
            vector.setFromMatrixPosition(mesh.matrixWorld);
            vector.y += 1.2; // オブジェクトの少し上に表示

            vector.project(camera);

            const x = (vector.x * .5 + .5) * container.clientWidth;
            const y = (vector.y * -.5 + .5) * container.clientHeight;

            const el = document.getElementById(elementId);
            el.style.display = 'block';
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
        }

        // --- メインゲームループ ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            // --- 1. 厨房の生産ロジック ---
            if (gameState.kitchen.stock < 50) {
                gameState.kitchen.timer += dt;
                if (gameState.kitchen.timer >= gameState.kitchen.speed) {
                    gameState.kitchen.stock += gameState.kitchen.cap;
                    gameState.kitchen.timer = 0;
                    // 生産完了時にちょっと跳ねるアニメーション効果
                    kitchenMesh.scale.set(1.1, 1.2, 1.1);
                }
            }
            // 縮小をもとに戻す緩急アニメーション
            kitchenMesh.scale.lerp(new THREE.Vector3(1,1,1), 0.1);

            // --- 2. 配膳の輸送ロジックとカートの3D移動 ---
            if (gameState.kitchen.stock > 0 && gameState.serve.stock < 50) {
                gameState.serve.timer += dt;
                let progress = gameState.serve.timer / gameState.serve.speed;
                
                // カートを行ったり来たりさせる位置計算（往復運動）
                if (progress <= 0.5) {
                    // 厨房からカウンターへ向かう (0.0 ～ 0.5の時間を0.0 ～ 1.0へ変換)
                    let p2 = progress * 2;
                    cartMesh.position.x = THREE.MathUtils.lerp(-2.5, -0.8, p2);
                } else {
                    // カウンターから厨房へ戻る (0.5 ～ 1.0の時間を0.0 ～ 1.0へ変換)
                    let p2 = (progress - 0.5) * 2;
                    cartMesh.position.x = THREE.MathUtils.lerp(-0.8, -2.5, p2);
                }

                if (gameState.serve.timer >= gameState.serve.speed) {
                    let takeAmount = Math.min(gameState.kitchen.stock, gameState.serve.cap);
                    gameState.kitchen.stock -= takeAmount;
                    gameState.serve.stock += takeAmount;
                    gameState.serve.timer = 0;
                }
            } else {
                // 動いていない時は厨房側で待機
                cartMesh.position.x = -2.5;
                gameState.serve.timer = 0;
            }

            // --- 3. レジの換金ロジック ---
            if (gameState.serve.stock > 0) {
                gameState.cash.timer += dt;
                if (gameState.cash.timer >= gameState.cash.speed) {
                    let eatAmount = Math.min(gameState.serve.stock, gameState.cash.cap);
                    gameState.serve.stock -= eatAmount;
                    gameState.money += eatAmount * RAMEN_PRICE;
                    gameState.cash.timer = 0;
                    cashMesh.scale.set(1.2, 1.2, 1.2);
                }
            } else {
                gameState.cash.timer = 0;
            }
            cashMesh.scale.lerp(new THREE.Vector3(1,1,1), 0.1);

            // 3DモデルとUI表示の更新
            updateRamenVisuals();
            updateUI();

            // 3D文字の位置同期
            updateLabelPosition(kitchenMesh, 'label-kitchen');
            updateLabelPosition(counterMesh, 'label-serve');
            updateLabelPosition(cashMesh, 'label-cash');

            // 画面のレンダリング
            renderer.render(scene, camera);
        }

        // --- 画面UIのテキスト更新 ---
        function updateUI() {
            document.getElementById('money').innerText = `¥${gameState.money.toLocaleString()}`;

            document.getElementById('label-kitchen').innerText = `出来上がり: ${gameState.kitchen.stock}杯`;
            document.getElementById('label-serve').innerText = `カウンター: ${gameState.serve.stock}杯`;
            document.getElementById('label-cash').innerText = gameState.serve.stock > 0 ? `会計中...` : `空き席`;

            // ボタンとステータス
            updateCard('kitchen', '速度: ' + gameState.kitchen.speed.toFixed(2) + '秒 | 容量: ' + gameState.kitchen.cap);
            updateCard('serve', '速度: ' + gameState.serve.speed.toFixed(2) + '秒 | 容量: ' + gameState.serve.cap);
            updateCard('cash', '速度: ' + gameState.cash.speed.toFixed(2) + '秒 | 容量: ' + gameState.cash.cap);
        }

        function getCost(type) {
            return Math.floor(gameState[type].baseCost * Math.pow(1.3, gameState[type].lv - 1));
        }

        function updateCard(type, statsText) {
            let cost = getCost(type);
            document.getElementById(`lvl-${type}`).innerText = `Lv.${gameState[type].lv}`;
            document.getElementById(`stats-${type}`).innerText = statsText;
            
            let btn = document.getElementById(`btn-${type}`);
            btn.innerText = `強化: ¥${cost.toLocaleString()}`;
            btn.disabled = gameState.money < cost;
        }

        // --- アップグレード処理 ---
        function upgrade(type) {
            let cost = getCost(type);
            if (gameState.money >= cost) {
                gameState.money -= cost;
                gameState[type].lv += 1;

                if (type === 'kitchen') {
                    gameState.kitchen.speed = Math.max(0.1, 1.0 - (gameState.kitchen.lv * 0.03));
                    if (gameState.kitchen.lv % 3 === 0) gameState.kitchen.cap += 1;
                } 
                else if (type === 'serve') {
                    gameState.serve.speed = Math.max(0.1, 1.5 - (gameState.serve.lv * 0.04));
                    if (gameState.serve.lv % 3 === 0) gameState.serve.cap += 1;
                } 
                else if (type === 'cash') {
                    gameState.cash.speed = Math.max(0.1, 2.0 - (gameState.cash.lv * 0.05));
                    if (gameState.cash.lv % 2 === 0) gameState.cash.cap += 1;
                }
                updateUI();
            }
        }

        // ウィンドウのリサイズ対応
        window.addEventListener('resize', () => {
            const aspect = container.clientWidth / container.clientHeight;
            const d = 6;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // 開始！
        animate();
    </script>
</body>
</html>
